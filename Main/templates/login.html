<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetry Core - Sign In</title>
    <style>
        /* Shared engine styled exactly similar to registration matrix bounds */
        :root {
            --bg-dark-core: #070b14;
            --glass-panel-bg: rgba(15, 23, 42, 0.45);
            --border-subtle: rgba(255, 255, 255, 0.05);
            --neon-blue: #06b6d4;
            --neon-red: #ef4444;
            --font-ui: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-telemetry: 'Courier New', Courier, monospace;
            --layer-blur: blur(16px);
            --smooth-transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body.auth-viewport {
            font-family: var(--font-ui); background-color: var(--bg-dark-core); color: #f8fafc; min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 30%, #0d1b3a 0%, #070b14 80%),
                linear-gradient(rgba(6, 182, 212, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.01) 1px, transparent 1px);
            background-size: 100% 100%, 25px 25px, 25px 25px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; overflow-x: hidden;
        }

        .auth-glass-box {
            background: var(--glass-panel-bg); border: 1px solid var(--border-subtle); backdrop-filter: var(--layer-blur);
            -webkit-backdrop-filter: var(--layer-blur); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); z-index: 5; transition: var(--smooth-transition);
        }

        .auth-glass-box.blue-glow:hover { border-color: rgba(59, 130, 246, 0.3); box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-icon-shield { display: inline-flex; padding: 12px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-subtle); border-radius: 50%; margin-bottom: 1rem; }
        .auth-header h2 { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 0.25rem; }
        .auth-header p { font-size: 0.85rem; color: #64748b; }

        .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
        .input-container { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-container label { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; font-weight: 500; }
        .field-wrapper { position: relative; display: flex; align-items: center; }
        .field-icon { position: absolute; left: 14px; color: #475569; pointer-events: none; transition: var(--smooth-transition); }
        
        .field-wrapper input {
            width: 100%; padding: 12px 14px 12px 42px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px; color: #ffffff; font-family: var(--font-ui); font-size: 0.9rem; outline: none; transition: var(--smooth-transition);
        }
        .field-wrapper input:focus { border-color: var(--neon-blue); background: rgba(15, 23, 42, 0.9); box-shadow: 0 0 10px rgba(6, 182, 212, 0.15); }
        .field-wrapper input:focus + .field-icon { color: var(--neon-blue); }

        .btn-auth-submit {
            width: 100%; padding: 12px; background: linear-gradient(90deg, #2563eb, #1d4ed8); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff; font-family: var(--font-ui); font-size: 0.9rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: var(--smooth-transition); margin-top: 0.5rem;
        }
        .btn-auth-submit:hover { transform: translateY(-1px); box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }

        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #64748b; }
        .auth-footer a { color: var(--neon-blue); text-decoration: none; font-weight: 500; }
        .auth-footer a:hover { text-decoration: underline; }

        .auth-toast {
            padding: 10px 14px; border-radius: 8px; margin-bottom: 1.25rem; font-size: 0.8rem; font-family: var(--font-telemetry);
            background: rgba(239, 68, 68, 0.15); border: 1px solid var(--neon-red); color: #fca5a5;
        }
    </style>
</head>
<body class="auth-viewport">
    <div class="auth-glass-box blue-glow">
        <div class="auth-header">
            <div class="auth-icon-shield">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h2>Establish Console Session</h2>
            <p>Provide authority variables to load telemetry pipeline</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="auth-toast">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="auth-form">
            {% csrf_token %}
            
            <div class="input-container">
                <label>Terminal Username</label>
                <div class="field-wrapper">
                    <span class="field-icon">@</span>
                    <input type="text" name="username" placeholder="Username identifier..." required>
                </div>
            </div>

            <div class="input-container">
                <label>Access Credential Phrase</label>
                <div class="field-wrapper">
                    <span class="field-icon">🔒</span>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-auth-submit">Validate Authority Instance</button>
        </form>

        <div class="auth-footer">
            First instantiation sequence? <a href="{% url 'register' %}">Build Cluster Profile</a>
        </div>
    </div>
</body>
</html>
