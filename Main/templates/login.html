{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Terminal - Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-viewport">

    <div class="auth-glass-box blue-glow">
        <div class="auth-header">
            <div class="auth-icon-shield">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h2>Terminal Access</h2>
            <p>Authorization required for terminal link</p>
        </div>

        {% if messages %}
            <div class="auth-messages">
                {% for message in messages %}
                    <div class="auth-toast error">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        
        <div class="validation-error-box" id="errorBlock"></div>

        <form method="POST" action="{% url 'login' %}" class="auth-form" id="loginForm">
            {% csrf_token %}
            
            <div class="input-container">
                <label for="username">Operator Identity</label>
                <div class="field-wrapper">
                    <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="username" name="username" placeholder="Username or Email" required>
                </div>
            </div>

            <div class="input-container">
                <label for="password">Passkey Credentials</label>
                <div class="field-wrapper">
                    <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-auth-submit">Authenticate Link</button>
        </form>

        <div class="auth-footer">
            <p>New operator node workstation? <a href="{% url 'register' %}">Enroll Node</a></p>
        </div>
    </div>

    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
