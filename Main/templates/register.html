{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Terminal - Registration</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-viewport">

    <div class="auth-glass-box green-glow">
        <div class="auth-header">
            <div class="auth-icon-shield">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            </div>
            <h2>Node Provisioning</h2>
            <p>Enroll alternative terminal credentials</p>
        </div>

        {% if messages %}
            <div class="auth-messages">
                {% for message in messages %}
                    <div class="auth-toast {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        
        <div class="validation-error-box" id="errorBlock"></div>

        <form method="POST" action="{% url 'register' %}" class="auth-form" id="registerForm">
            {% csrf_token %}
            
            <div class="input-container">
                <label for="username">Operator Identity Code</label>
                <div class="field-wrapper">
                    <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="username" name="username" placeholder="Choose identity tag" required>
                </div>
            </div>

            <div class="input-container">
                <label for="email">Network Email Endpoint</label>
                <div class="field-wrapper">
                    <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" id="email" name="email" placeholder="operator@gmail.com" required>
                </div>
            </div>

            <div class="input-container">
                <label for="password">System Passkey</label>
                <div class="field-wrapper">
                    <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="input-container">
                <label for="confirm_password">Verify Passkey</label>
                <div class="field-wrapper">
                    <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-auth-submit btn-reg-submit">Register Workstation</button>
        </form>

        <div class="auth-footer">
            <p>Active terminal link present? <a href="{% url 'login' %}">Connect here</a></p>
        </div>
    </div>

    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
